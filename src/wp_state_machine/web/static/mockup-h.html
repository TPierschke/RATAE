<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Heatpump Dashboard Mockup H</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg:#08111a; --panel:rgba(14,22,32,.86); --line:#57708c; --text:#dbe7f6; --muted:#89a1bb;
      --hz:#53a7ff; --ww:#ff6e63; --rt:#f0b04b; --glow:0 20px 50px rgba(0,0,0,.35);
    }
    * { box-sizing:border-box; }
    html,body { height:100%; }
    body {
      margin:0; color:var(--text); font-family:"IBM Plex Sans",sans-serif;
      background:
        radial-gradient(circle at 15% 20%,rgba(83,167,255,.08),transparent 24%),
        radial-gradient(circle at 85% 18%,rgba(255,110,99,.09),transparent 20%),
        linear-gradient(180deg,#081018 0%,#0b131c 48%,#070d14 100%);
    }
    .app { min-height:100%; display:grid; grid-template-rows:1fr auto; gap:16px; padding:20px; }
    .dashboard { position:relative; display:grid; grid-template-columns:minmax(0,1fr) 300px; gap:18px; }
    .schema,.panel,.state {
      border:1px solid rgba(124,160,194,.18); background:var(--panel); box-shadow:var(--glow); backdrop-filter:blur(8px);
    }
    .schema { position:relative; overflow:hidden; border-radius:22px; padding:18px; }
    .schema::before {
      content:"LIVE SCHEMATIC / ANLAGENSCHEMA"; position:absolute; top:14px; left:18px; color:var(--muted);
      font-size:12px; letter-spacing:.18em;
    }
    .dry {
      position:absolute; top:16px; right:16px; padding:6px 10px; border-radius:999px;
      border:1px solid rgba(255,190,92,.45); color:#ffd48a; background:rgba(255,181,71,.08);
      font:600 11px/1 "JetBrains Mono",monospace; letter-spacing:.14em;
    }
    .state {
      position:absolute; top:24px; right:338px; z-index:2; min-width:220px; padding:14px 16px; border-radius:18px;
    }
    .kicker { color:var(--muted); font-size:11px; letter-spacing:.18em; margin:0 0 6px; }
    .state .value { margin:0; font-size:28px; font-weight:700; line-height:1.05; }
    .panel { border-radius:22px; padding:24px 20px; display:flex; flex-direction:column; justify-content:center; gap:18px; }
    h2,p,.footer { margin:0; }
    h2 { font-size:18px; letter-spacing:.06em; }
    p { color:var(--muted); font-size:14px; line-height:1.5; }
    .label { display:block; margin:0 0 8px; color:var(--muted); font-size:12px; letter-spacing:.08em; text-transform:uppercase; }
    select,button {
      width:100%; border:1px solid rgba(112,145,177,.28); border-radius:14px; color:var(--text);
      background:#0f1924; font:500 15px/1.2 "IBM Plex Sans",sans-serif;
    }
    select { appearance:none; padding:14px 16px; }
    button { padding:15px 16px; cursor:pointer; font-weight:600; background:linear-gradient(180deg,#1a3249,#122536); }
    .footer {
      padding:14px 18px; border-radius:18px; text-align:center; background:rgba(10,17,25,.82);
      border:1px solid rgba(124,160,194,.16); color:#aac0d8; font:600 13px/1 "JetBrains Mono",monospace; letter-spacing:.08em;
    }
    svg { display:block; width:100%; height:auto; margin-top:28px; }
    .shell { fill:#132131; stroke:var(--line); stroke-width:2.2; }
    .pipe { fill:none; stroke-width:16; stroke-linecap:round; stroke-linejoin:round; opacity:.9; }
    .hz { stroke:var(--hz); } .ww { stroke:var(--ww); } .rt { stroke:var(--rt); }
    .flow {
      fill:none; stroke:rgba(232,244,255,.92); stroke-width:4; stroke-linecap:round; stroke-dasharray:1 18;
      animation:drift 2.8s linear infinite;
    }
    .slow { animation-duration:4.2s; opacity:.75; }
    .tag,.comp,.val,.sensor-t,.sensor-v { font-family:"JetBrains Mono",monospace; }
    .tag { fill:#88a4c0; font-size:11px; letter-spacing:.16em; }
    .comp { fill:#d5e3f2; font-size:13px; letter-spacing:.04em; }
    .val { fill:#edf6ff; font-size:14px; font-weight:600; }
    .guide { stroke:rgba(89,113,139,.35); stroke-width:1; }
    .sensor-line { stroke:#607a97; stroke-width:1.5; stroke-dasharray:4 5; }
    .sensor-node { fill:#0d1722; stroke:#afc7dd; stroke-width:2; }
    .sensor-t { fill:#edf6ff; font-size:11px; }
    .sensor-v { fill:#9cc6ff; font-size:11px; }
    @keyframes drift { to { stroke-dashoffset:-120; } }
    @media (max-width:980px) {
      .dashboard { grid-template-columns:1fr; }
      .state { position:static; order:-1; margin-bottom:-4px; }
    }
    @media (max-width:640px) {
      .app { padding:12px; }
      .schema { padding:14px; }
      .state .value { font-size:22px; }
      .panel { padding:18px 16px; }
    }
  </style>
</head>
<body>
<!-- theme-switcher -->
<style>
  #theme-switcher {
    position: fixed;
    top: 12px;
    left: 12px;
    z-index: 9999;
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 6px 10px;
    border: 1px solid rgba(255, 255, 255, 0.12);
    border-radius: 999px;
    background: rgba(8, 10, 16, 0.78);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    color: rgba(255, 255, 255, 0.92);
    font: 11px/1.2 "JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
  }

  #theme-switcher label {
    color: inherit;
    white-space: nowrap;
  }

  #theme-switcher select {
    margin: 0;
    padding: 0;
    border: 0;
    background: transparent;
    color: inherit;
    font: inherit;
    appearance: none;
    -webkit-appearance: none;
  }

  #theme-switcher select:focus {
    outline: none;
  }

  #theme-switcher select:focus-visible {
    outline: 1px solid rgba(255, 255, 255, 0.55);
    outline-offset: 3px;
    border-radius: 6px;
  }

  #theme-switcher option {
    color: #111827;
  }

  @media print {
    #theme-switcher {
      display: none !important;
    }
  }
</style>
<div id="theme-switcher">
  <label for="theme-switcher-select">Theme:</label>
  <select id="theme-switcher-select" aria-label="Theme switcher">
    <option value="live">Live UI</option>
    <option value="a">Neon Console</option>
    <option value="c">Glass Future</option>
    <option value="d">Kinetic Maximalism</option>
    <option value="e">Bauhaus Industrial</option>
    <option value="f">Liquid Chrome</option>
    <option value="g">Utilitarian Cockpit</option>
    <option value="h">Live Schematic</option>
    <option value="i">Light Calm</option>
    <option value="j">Aviation Cockpit</option>
    <option value="k">Linear Pro</option>
  </select>
</div>
<script>
  (function () {
    var select = document.getElementById('theme-switcher-select');
    if (!select) return;

    var path = window.location.pathname;
    var match = path.match(/^\/t\/([a-z]+)$/) || path.match(/^\/static\/mockup-([a-z]+)\.html$/);
    select.value = match ? match[1] : 'live';

    select.addEventListener('change', async function () {
      var value = select.value;
      try {
        var resp = await fetch('/api/theme', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({theme: value})
        });
        if (!resp.ok) {
          console.error('Theme switch failed:', resp.status, resp.statusText);
          return;
        }
        window.location.href = value === 'live' ? '/' : '/t/' + value;
      } catch (error) {
        console.error('Theme switch failed:', error);
      }
    });
  })();
</script>
<!-- /theme-switcher -->
